channels:
  - "https://www.youtube.com/@ThePrimeTimeagen"
  - "https://www.youtube.com/@mehulmpt"
  - "https://www.youtube.com/@t3dotgg"
  - "https://www.youtube.com/@LowLevelTV"

max_channels: 10

summary:
  word_limit: 50

comments:
  enabled: false
  top_n: 10
  order: relevance

schedule:
    # Runs 3x/day (UTC). Adjust to your preferred local times.
    # Cron format: minute hour day month day-of-week
    - "0 0 * * *"   # 00:00 UTC
    - "0 8 * * *"   # 08:00 UTC
    - "0 16 * * *"  # 16:00 UTC

archive:
  retention_days: 30

llm:
  provider: "gemini"
  model: "gemini-3.1-flash-lite"

telegram:
  digest_enabled: true
  status_enabled: true
